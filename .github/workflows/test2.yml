name: test2

on:
  - push
  - pull_request
  - workflow_dispatch

jobs:
  build:
    name: ${{ matrix.os }} Ruby ${{ matrix.ruby }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu", "macos", "windows"]
        ruby: ["2.7", "3.0", "3.1", "3.2", "3.3", "3.4", "head"]
    runs-on: ${{ matrix.os }}-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Download libui shared libraries
        run: bundle exec rake vendor:auto

      - name: Install dependencies on Linux
        if: matrix.os == 'ubuntu'
        run: sudo apt-get install -y imagemagick

      - name: Run example on all OS
        run: |
          bundle exec ruby examples/basic_window.rb &
          sleep 5

      - name: Take desktop screenshot (all OS)
        uses: OrbitalOwen/desktop-screenshot-action@0.1
        with:
          file-name: "screenshot-${{ matrix.os }}.jpg"

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.os }}-${{ matrix.ruby }}
          path: screenshot-${{ matrix.os }}.jpg
          if-no-files-found: ignore
